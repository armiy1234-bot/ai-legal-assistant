name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 */14 * 0'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run database migrations
        if: github.event_name == 'push'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:push
      - name: Build application
        run: npm run build
      - name: Deploy to Vercel
        if: github.event_name == 'push'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
      - name: Run court scraper (scheduled)
        if: github.event_name == 'schedule'
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }} # 🔄 Обновлено
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "Запуск обновления судебной практики..."
          npm run scrape || echo "⚠️ Скрипт парсинга требует доработки под конкретные источники"